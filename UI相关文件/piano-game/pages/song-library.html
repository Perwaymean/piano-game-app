<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">

    <title>曲库 · 键琴</title>
    <style id="theme-vars">
/* ============================================================
   键盘弹钢琴 — 品牌设计 Token
   prefix: piano | theme: dark (default) / light (high-contrast)
   ============================================================ */

/* --- @font-face (absolute URL, no @import) --- */
@font-face {
  font-family: 'Outfit';
  font-weight: 400;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/fontsource/fonts/outfit@latest/latin-400-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'Outfit';
  font-weight: 600;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/fontsource/fonts/outfit@latest/latin-600-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'Outfit';
  font-weight: 700;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/fontsource/fonts/outfit@latest/latin-700-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'JetBrains Mono';
  font-weight: 500;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/fontsource/fonts/jetbrains-mono@latest/latin-500-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'JetBrains Mono';
  font-weight: 700;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/fontsource/fonts/jetbrains-mono@latest/latin-700-normal.woff2') format('woff2');
}

/* --- @theme inline (fill-html-head.mjs semantic marker) --- */
@theme inline {
  --color-piano-purple: #6d28d9;
  --color-piano-pink: #db2777;
  --color-piano-cyan: #0891b2;
}

/* --- Brand Color Scale --- */
:root {
  --piano-purple: #6d28d9;
  --piano-purple-300: #c4b5fd;
  --piano-purple-400: #a78bfa;
  --piano-purple-500: #8b5cf6;
  --piano-purple-600: #7c3aed;
  --piano-purple-700: #5b21b6;

  --piano-pink: #db2777;
  --piano-pink-300: #f9a8d4;
  --piano-pink-400: #f472b6;
  --piano-pink-soft: rgba(219, 39, 119, 0.14);

  --piano-cyan: #0891b2;
  --piano-cyan-300: #67e8f9;
  --piano-cyan-400: #22d3ee;
  --piano-cyan-soft: rgba(8, 145, 178, 0.14);

  /* Semantic state colors (judgment tiers) */
  --state-success: #22d3ee;  /* Perfect ±50ms → cyan */
  --state-info: #8b5cf6;     /* Great ±100ms → purple */
  --state-warning: #db2777;  /* Good ±150ms → pink */
  --state-error: #f43f5e;    /* Miss → red */

  /* Radius scale (restrained) */
  --piano-radius-sm: 4px;
  --piano-radius-md: 8px;
  --piano-radius-lg: 16px;
  --piano-radius-full: 9999px;

  /* Typography */
  --piano-font-display: 'Outfit', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --piano-font-body: 'Outfit', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --piano-font-mono: 'JetBrains Mono', 'Noto Sans SC', monospace;
}

/* --- Light theme (high-contrast accessibility mode) --- */
:root {
  --piano-background: #ffffff;
  --piano-foreground: #0b0a14;
  --piano-card: #f6f7fb;
  --piano-card-foreground: #16182d;
  --piano-popover: #ffffff;
  --piano-popover-foreground: #0b0a14;
  --piano-muted: #eef0f7;
  --piano-muted-foreground: #6a6c80;
  --piano-border: #e7e8f0;
  --piano-input: #e7e8f0;
  --piano-ring: #6d28d9;
  --piano-primary: #6d28d9;
  --piano-primary-foreground: #ffffff;

  /* Semantic aliases for fill-html-head.mjs */
  --piano-radius-small: 4px;
  --piano-radius-medium: 8px;
  --piano-radius-large: 16px;
}

/* --- Dark theme (default immersive mode) --- */
.dark {
  --piano-background: #0d0b1a;
  --piano-foreground: #f4f1ff;
  --piano-card: #16132a;
  --piano-card-foreground: #ece8ff;
  --piano-popover: #1d1936;
  --piano-popover-foreground: #f4f1ff;
  --piano-muted: #1d1936;
  --piano-muted-foreground: #a89fcf;
  --piano-border: #2a2545;
  --piano-input: #2a2545;
  --piano-ring: #8b5cf6;
  --piano-primary: #8b5cf6;
  --piano-primary-foreground: #ffffff;

  --piano-radius-small: 4px;
  --piano-radius-medium: 8px;
  --piano-radius-large: 16px;
}

/* --- Semantic token fallback (fill-html-head.mjs marker) --- */
#semantic-token-fallback {
  --background: var(--piano-background);
  --foreground: var(--piano-foreground);
  --card: var(--piano-card);
  --card-foreground: var(--piano-card-foreground);
  --popover: var(--piano-popover);
  --popover-foreground: var(--piano-popover-foreground);
  --muted: var(--piano-muted);
  --muted-foreground: var(--piano-muted-foreground);
  --border: var(--piano-border);
  --input: var(--piano-input);
  --ring: var(--piano-ring);
  --primary: var(--piano-primary);
  --primary-foreground: var(--piano-primary-foreground);
  --radius-sm: var(--piano-radius-sm);
  --radius-md: var(--piano-radius-md);
  --radius-lg: var(--piano-radius-lg);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--piano-background);
    --color-foreground: var(--piano-foreground);
    --color-card: var(--piano-card);
    --color-card-foreground: var(--piano-card-foreground);
    --color-popover: var(--piano-popover);
    --color-popover-foreground: var(--piano-popover-foreground);
    --color-primary: var(--piano-primary);
    --color-primary-foreground: var(--piano-primary-foreground);
    --color-muted: var(--piano-muted);
    --color-muted-foreground: var(--piano-muted-foreground);
    --color-border: var(--piano-border);
    --color-input: var(--piano-input);
    --color-ring: var(--piano-ring);
    --radius-sm: var(--piano-radius-sm);
    --radius-md: var(--piano-radius-md);
    --radius-lg: var(--piano-radius-lg);
  }
  @layer base {
    body { background: var(--piano-background); color: var(--piano-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>

<body class="min-h-screen font-sans antialiased">
    <main>
      <!-- Fixed shared background -->
      <div aria-hidden="true" class="fixed inset-0" style="z-index: -1; background: radial-gradient(ellipse at 50% 0%, var(--piano-purple-700), var(--piano-background) 70%);"></div>

      <!-- Shared top bar -->
      <header class="fixed top-0 inset-x-0 flex items-center justify-between px-4 sm:px-6" style="height: 56px; background: var(--piano-card); border-bottom: 1px solid var(--piano-border); z-index: 50;">
        <a href="#" data-dom-id="back-home" class="font-bold no-underline" style="font-family: var(--piano-font-display); font-size: 20px; font-weight: 700; color: var(--piano-foreground);">键琴</a>
        <nav class="flex items-center gap-6">
          <a href="#" data-nav-key="home" data-dom-id="nav-home" class="text-sm no-underline transition-colors" style="color: var(--piano-muted-foreground);">首页</a>
          <a href="#" data-nav-key="library" data-dom-id="nav-library" class="text-sm font-semibold no-underline" style="color: var(--piano-primary);">曲库</a>
          <a href="#" data-nav-key="settings" data-dom-id="nav-settings" class="text-sm no-underline transition-colors" style="color: var(--piano-muted-foreground);">设置</a>
        </nav>
        <div class="flex items-center gap-1">
          <button aria-label="主题配色" class="p-2 rounded-md transition-colors" style="color: var(--piano-muted-foreground);">
            <i data-lucide="palette" style="width: 20px; height: 20px;"></i>
          </button>
          <button aria-label="帮助" class="p-2 rounded-md transition-colors" style="color: var(--piano-muted-foreground);">
            <i data-lucide="help-circle" style="width: 20px; height: 20px;"></i>
          </button>
        </div>
      </header>

      <!-- Page content container -->
      <div class="mx-auto px-4 sm:px-6" style="max-width: 1200px; padding-top: 80px;">

        <!-- Page header -->
        <div class="mb-8">
          <h1 class="font-bold" style="font-family: var(--piano-font-display); font-size: 32px; font-weight: 700; color: var(--piano-foreground); line-height: 1.2; text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">曲库</h1>
          <p class="mt-1" style="font-size: 14px; color: var(--piano-muted-foreground);">公有领域古典片段 + 自创练习曲</p>
        </div>

        <!-- Search + filter bar -->
        <div class="flex flex-wrap items-center gap-4 mb-8">
          <div class="relative flex-1 min-w-[200px]">
            <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none" style="width: 16px; height: 16px; color: var(--piano-muted-foreground);"></i>
            <input type="text" placeholder="搜索曲目..." class="w-full outline-none" style="background: var(--piano-card); border: 1px solid var(--piano-border); border-radius: var(--piano-radius-md); padding: 8px 16px 8px 40px; color: var(--piano-foreground); font-size: 14px;">
          </div>
          <div class="flex gap-2 flex-nowrap overflow-x-auto no-scrollbar">
            <button class="whitespace-nowrap shrink-0 transition-colors" style="background: var(--piano-primary); color: var(--piano-primary-foreground); border-radius: var(--piano-radius-full); padding: 4px 16px; font-size: 13px; border: none;">全部</button>
            <button class="whitespace-nowrap shrink-0 transition-colors" style="background: transparent; border: 1px solid var(--piano-border); color: var(--piano-foreground); border-radius: var(--piano-radius-full); padding: 4px 16px; font-size: 13px;">入门</button>
            <button class="whitespace-nowrap shrink-0 transition-colors" style="background: transparent; border: 1px solid var(--piano-border); color: var(--piano-foreground); border-radius: var(--piano-radius-full); padding: 4px 16px; font-size: 13px;">进阶</button>
            <button class="whitespace-nowrap shrink-0 transition-colors" style="background: transparent; border: 1px solid var(--piano-border); color: var(--piano-foreground); border-radius: var(--piano-radius-full); padding: 4px 16px; font-size: 13px;">挑战</button>
          </div>
        </div>

        <!-- Song grid -->
        <div class="song-grid">

          <!-- Song 1: 小星星 (SELECTED) -->
          <section tabindex="0" class="song-item song-selected" aria-label="小星星">
            <div class="flex items-center justify-center" style="height: 140px; background: linear-gradient(135deg, var(--piano-purple-600), var(--piano-purple-400));">
              <i data-lucide="music" style="width: 32px; height: 32px; color: var(--piano-primary-foreground); opacity: 0.8;"></i>
            </div>
            <div style="padding: 12px;">
              <h3 class="truncate" style="font-family: var(--piano-font-display); font-size: 15px; font-weight: 600; color: var(--piano-foreground);">小星星</h3>
              <div class="flex items-center gap-1 mt-1" style="font-family: var(--piano-font-mono); font-size: 11px; color: var(--piano-muted-foreground);">
                <span class="diff-pill diff-beginner">入门</span>
                <span>·</span>
                <span>80 BPM</span>
                <span>·</span>
                <span>0:45</span>
              </div>
            </div>
          </section>

          <!-- Song 2: 欢乐颂 -->
          <section tabindex="0" class="song-item" aria-label="欢乐颂">
            <div class="flex items-center justify-center" style="height: 140px; background: linear-gradient(135deg, var(--piano-pink), var(--piano-purple-500));">
              <i data-lucide="music" style="width: 32px; height: 32px; color: var(--piano-primary-foreground); opacity: 0.8;"></i>
            </div>
            <div style="padding: 12px;">
              <h3 class="truncate" style="font-family: var(--piano-font-display); font-size: 15px; font-weight: 600; color: var(--piano-foreground);">欢乐颂</h3>
              <div class="flex items-center gap-1 mt-1" style="font-family: var(--piano-font-mono); font-size: 11px; color: var(--piano-muted-foreground);">
                <span class="diff-pill diff-intermediate">进阶</span>
                <span>·</span>
                <span>120 BPM</span>
                <span>·</span>
                <span>1:20</span>
              </div>
            </div>
          </section>

          <!-- Song 3: 卡农片段 -->
          <section tabindex="0" class="song-item" aria-label="卡农片段">
            <div class="flex items-center justify-center" style="height: 140px; background: linear-gradient(135deg, var(--piano-cyan), var(--piano-purple-600));">
              <i data-lucide="music" style="width: 32px; height: 32px; color: var(--piano-primary-foreground); opacity: 0.8;"></i>
            </div>
            <div style="padding: 12px;">
              <h3 class="truncate" style="font-family: var(--piano-font-display); font-size: 15px; font-weight: 600; color: var(--piano-foreground);">卡农片段</h3>
              <div class="flex items-center gap-1 mt-1" style="font-family: var(--piano-font-mono); font-size: 11px; color: var(--piano-muted-foreground);">
                <span class="diff-pill diff-challenge">挑战</span>
                <span>·</span>
                <span>64 BPM</span>
                <span>·</span>
                <span>1:50</span>
              </div>
            </div>
          </section>

          <!-- Song 4: 天空之城片段 -->
          <section tabindex="0" class="song-item" aria-label="天空之城片段">
            <div class="flex items-center justify-center" style="height: 140px; background: linear-gradient(135deg, var(--piano-purple-700), var(--piano-pink));">
              <i data-lucide="music" style="width: 32px; height: 32px; color: var(--piano-primary-foreground); opacity: 0.8;"></i>
            </div>
            <div style="padding: 12px;">
              <h3 class="truncate" style="font-family: var(--piano-font-display); font-size: 15px; font-weight: 600; color: var(--piano-foreground);">天空之城片段</h3>
              <div class="flex items-center gap-1 mt-1" style="font-family: var(--piano-font-mono); font-size: 11px; color: var(--piano-muted-foreground);">
                <span class="diff-pill diff-intermediate">进阶</span>
                <span>·</span>
                <span>72 BPM</span>
                <span>·</span>
                <span>1:15</span>
              </div>
            </div>
          </section>

          <!-- Song 5: 生日快乐 -->
          <section tabindex="0" class="song-item" aria-label="生日快乐">
            <div class="flex items-center justify-center" style="height: 140px; background: linear-gradient(135deg, var(--piano-cyan-400), var(--piano-purple-500));">
              <i data-lucide="music" style="width: 32px; height: 32px; color: var(--piano-primary-foreground); opacity: 0.8;"></i>
            </div>
            <div style="padding: 12px;">
              <h3 class="truncate" style="font-family: var(--piano-font-display); font-size: 15px; font-weight: 600; color: var(--piano-foreground);">生日快乐</h3>
              <div class="flex items-center gap-1 mt-1" style="font-family: var(--piano-font-mono); font-size: 11px; color: var(--piano-muted-foreground);">
                <span class="diff-pill diff-beginner">入门</span>
                <span>·</span>
                <span>100 BPM</span>
                <span>·</span>
                <span>0:30</span>
              </div>
            </div>
          </section>

          <!-- Song 6: 练习曲 No.1 -->
          <section tabindex="0" class="song-item" aria-label="练习曲 No.1">
            <div class="flex items-center justify-center" style="height: 140px; background: linear-gradient(135deg, var(--piano-purple-400), var(--piano-cyan));">
              <i data-lucide="music" style="width: 32px; height: 32px; color: var(--piano-primary-foreground); opacity: 0.8;"></i>
            </div>
            <div style="padding: 12px;">
              <h3 class="truncate" style="font-family: var(--piano-font-display); font-size: 15px; font-weight: 600; color: var(--piano-foreground);">练习曲 No.1</h3>
              <div class="flex items-center gap-1 mt-1" style="font-family: var(--piano-font-mono); font-size: 11px; color: var(--piano-muted-foreground);">
                <span class="diff-pill diff-beginner">入门</span>
                <span>·</span>
                <span>60 BPM</span>
                <span>·</span>
                <span>0:50</span>
              </div>
            </div>
          </section>

          <!-- Song 7: 练习曲 No.2 -->
          <section tabindex="0" class="song-item" aria-label="练习曲 No.2">
            <div class="flex items-center justify-center" style="height: 140px; background: linear-gradient(135deg, var(--piano-pink), var(--piano-cyan-400));">
              <i data-lucide="music" style="width: 32px; height: 32px; color: var(--piano-primary-foreground); opacity: 0.8;"></i>
            </div>
            <div style="padding: 12px;">
              <h3 class="truncate" style="font-family: var(--piano-font-display); font-size: 15px; font-weight: 600; color: var(--piano-foreground);">练习曲 No.2</h3>
              <div class="flex items-center gap-1 mt-1" style="font-family: var(--piano-font-mono); font-size: 11px; color: var(--piano-muted-foreground);">
                <span class="diff-pill diff-intermediate">进阶</span>
                <span>·</span>
                <span>90 BPM</span>
                <span>·</span>
                <span>1:00</span>
              </div>
            </div>
          </section>

          <!-- Song 8: 月光片段 -->
          <section tabindex="0" class="song-item" aria-label="月光片段">
            <div class="flex items-center justify-center" style="height: 140px; background: linear-gradient(135deg, var(--piano-purple-700), var(--piano-cyan));">
              <i data-lucide="music" style="width: 32px; height: 32px; color: var(--piano-primary-foreground); opacity: 0.8;"></i>
            </div>
            <div style="padding: 12px;">
              <h3 class="truncate" style="font-family: var(--piano-font-display); font-size: 15px; font-weight: 600; color: var(--piano-foreground);">月光片段</h3>
              <div class="flex items-center gap-1 mt-1" style="font-family: var(--piano-font-mono); font-size: 11px; color: var(--piano-muted-foreground);">
                <span class="diff-pill diff-challenge">挑战</span>
                <span>·</span>
                <span>56 BPM</span>
                <span>·</span>
                <span>1:40</span>
              </div>
            </div>
          </section>

        </div>

        <!-- Footer -->
        <footer class="text-center" style="padding: 24px; margin-bottom: 80px;">
          <p style="font-size: 12px; color: var(--piano-muted-foreground);">键琴 · 纯前端零后端</p>
        </footer>

      </div>

      <!-- Bottom action bar -->
      <div class="fixed bottom-0 inset-x-0 flex items-center justify-between px-4 sm:px-6" style="background: var(--piano-card); border-top: 1px solid var(--piano-border); padding: 16px 24px; z-index: 50;">
        <span class="text-sm truncate min-w-0" style="color: var(--piano-foreground); font-size: 14px;">已选择：小星星</span>
        <button data-dom-id="cta-play-song" class="font-semibold whitespace-nowrap shrink-0 transition-transform active:scale-95" style="background: var(--piano-primary); color: var(--piano-primary-foreground); border-radius: var(--piano-radius-md); padding: 10px 28px; font-family: var(--piano-font-display); font-size: 15px; font-weight: 600; border: none;">开始跟弹</button>
      </div>
    </main>
    <style>
      .song-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }
      @media (min-width: 640px) {
        .song-grid { grid-template-columns: repeat(2, 1fr); }
      }
      @media (min-width: 1024px) {
        .song-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
      }
      .song-item {
        border: 1px solid var(--piano-border);
        border-radius: var(--piano-radius-md);
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .song-item:hover {
        transform: translateY(-4px);
        border-color: var(--piano-primary);
      }
      .song-item.song-selected {
        border-color: var(--piano-primary);
        box-shadow: 0 0 0 2px var(--piano-primary);
      }
      .diff-pill {
        display: inline-flex;
        align-items: center;
        padding: 1px 6px;
        border-radius: var(--piano-radius-sm);
        font-size: 11px;
        font-family: var(--piano-font-mono);
        white-space: nowrap;
        line-height: 1.4;
      }
      .diff-beginner {
        background: var(--piano-cyan-soft);
        color: var(--piano-cyan-400);
      }
      .diff-intermediate {
        background: color-mix(in srgb, var(--piano-purple-400) 14%, transparent);
        color: var(--piano-purple-400);
      }
      .diff-challenge {
        background: var(--piano-pink-soft);
        color: var(--piano-pink);
      }
    </style>
    <script>lucide.createIcons();</script>
</body>
</html>
