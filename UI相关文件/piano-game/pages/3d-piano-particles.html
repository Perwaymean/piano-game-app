/* --- @theme inline (fill-html-head.mjs semantic marker) --- */
@theme inline {
  --color-piano-purple: #6d28d9;
  --color-piano-pink: #db2777;
  --color-piano-cyan: #0891b2;
}

/* --- Brand Color Scale --- */
:root {
  --piano-purple: #6d28d9;
  --piano-purple-300: #c4b5fd;
  --piano-purple-400: #a78bfa;
  --piano-purple-500: #8b5cf6;
  --piano-purple-600: #7c3aed;
  --piano-purple-700: #5b21b6;

  --piano-pink: #db2777;
  --piano-pink-300: #f9a8d4;
  --piano-pink-400: #f472b6;
  --piano-pink-soft: rgba(219, 39, 119, 0.14);

  --piano-cyan: #0891b2;
  --piano-cyan-300: #67e8f9;
  --piano-cyan-400: #22d3ee;
  --piano-cyan-soft: rgba(8, 145, 178, 0.14);

  /* Semantic state colors (judgment tiers) */
  --state-success: #22d3ee;  /* Perfect ±50ms → cyan */
  --state-info: #8b5cf6;     /* Great ±100ms → purple */
  --state-warning: #db2777;  /* Good ±150ms → pink */
  --state-error: #f43f5e;    /* Miss → red */

  /* Radius scale (restrained) */
  --piano-radius-sm: 4px;
  --piano-radius-md: 8px;
  --piano-radius-lg: 16px;
  --piano-radius-full: 9999px;

  /* Typography */
  --piano-font-display: 'Outfit', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --piano-font-body: 'Outfit', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --piano-font-mono: 'JetBrains Mono', 'Noto Sans SC', monospace;
}

/* --- Light theme (high-contrast accessibility mode) --- */
:root {
  --piano-background: #ffffff;
  --piano-foreground: #0b0a14;
  --piano-card: #f6f7fb;
  --piano-card-foreground: #16182d;
  --piano-popover: #ffffff;
  --piano-popover-foreground: #0b0a14;
  --piano-muted: #eef0f7;
  --piano-muted-foreground: #6a6c80;
  --piano-border: #e7e8f0;
  --piano-input: #e7e8f0;
  --piano-ring: #6d28d9;
  --piano-primary: #6d28d9;
  --piano-primary-foreground: #ffffff;

  /* Semantic aliases for fill-html-head.mjs */
  --piano-radius-small: 4px;
  --piano-radius-medium: 8px;
  --piano-radius-large: 16px;
}

/* --- Dark theme (default immersive mode) --- */
.dark {
  --piano-background: #0d0b1a;
  --piano-foreground: #f4f1ff;
  --piano-card: #16132a;
  --piano-card-foreground: #ece8ff;

  --piano-popover-foreground: #f4f1ff;

  --piano-radius-large: 16px;
}

}

    <!-- 2D Canvas Particle Background -->
    <script>
    // 2D Canvas 粒子背景
    (function() {
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const colors = ['rgba(139, 92, 246, ', 'rgba(219, 39, 119, ', 'rgba(34, 211, 238, ', 'rgba(255, 255, 255, '];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // 创建 150 个粒子
        for (let i = 0; i < 150; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                size: Math.random() * 2 + 0.5,
                color: colors[Math.floor(Math.random() * colors.length)],
                alpha: Math.random() * 0.5 + 0.1,
                pulse: Math.random() * Math.PI * 2
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(function(p, i) {
                p.x += p.vx;
                p.y += p.vy;
                p.pulse += 0.02;

                // 边界回绕
                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;

                const pulseAlpha = p.alpha * (0.5 + 0.5 * Math.sin(p.pulse));

                // 绘制粒子光晕
                const gradient = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size * 4);
                gradient.addColorStop(0, p.color + pulseAlpha + ')');
                gradient.addColorStop(1, p.color + '0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size * 4, 0, Math.PI * 2);
                ctx.fill();

                // 绘制粒子核心
                ctx.fillStyle = p.color + pulseAlpha + ')';
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                // 连线效果（近距离粒子）
                for (let j = i + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dx = p.x - p2.x;
                    const dy = p.y - p2.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 120) {
                        ctx.strokeStyle = p.color + (0.15 * (1 - dist / 120)) + ')';
                        ctx.lineWidth = 0.5;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.stroke();
                    }
                }
            });

            requestAnimationFrame(animate);
        }
        animate();
    })();
    </script>

    <!-- Three.js 3D Piano Scene -->
    <script>
    (function() {
        var container = document.getElementById('three-canvas');
        if (!container || typeof THREE === 'undefined') return;

        // === Scene ===
        var scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x0d0b1a, 0.02);

        // === Camera ===
        var w = container.clientWidth || window.innerWidth;
        var h = container.clientHeight || (window.innerHeight - 56);
        var camera = new THREE.PerspectiveCamera(55, w / h, 0.1, 1000);
        camera.position.set(0, 8, 18);
        camera.lookAt(0, 0, 0);

        // === Renderer ===
        var renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(w, h);
        container.appendChild(renderer.domElement);
        container.style.cursor = 'grab';

        // === Lights ===
        scene.add(new THREE.AmbientLight(0x4a3a7a, 0.5));

        var purpleLight = new THREE.PointLight(0x8b5cf6, 2.5, 50);
        purpleLight.position.set(-10, 12, 6);
        scene.add(purpleLight);

        var pinkLight = new THREE.PointLight(0xdb2777, 2, 50);
        pinkLight.position.set(10, 10, -4);
        scene.add(pinkLight);

        var cyanLight = new THREE.PointLight(0x22d3ee, 1.8, 50);
        cyanLight.position.set(0, -6, 10);
        scene.add(cyanLight);

        var dirLight = new THREE.DirectionalLight(0xffffff, 0.3);
        dirLight.position.set(0, 20, 10);
        scene.add(dirLight);

        // === Piano wooden frame ===
        var woodMat = new THREE.MeshStandardMaterial({ color: 0x2a1f3d, metalness: 0.3, roughness: 0.6 });

        var base = new THREE.Mesh(new THREE.BoxGeometry(18, 0.4, 7), woodMat);
        base.position.set(0, -0.45, 0);
        scene.add(base);

        var leftSide = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.2, 7), woodMat);
        leftSide.position.set(-8.5, -0.1, 0);
        scene.add(leftSide);

        var rightSide = new THREE.Mesh(new THREE.BoxGeometry(0.5, 1.2, 7), woodMat);
        rightSide.position.set(8.5, -0.1, 0);
        scene.add(rightSide);

        var topBoard = new THREE.Mesh(new THREE.BoxGeometry(18, 0.8, 1.5), woodMat);
        topBoard.position.set(0, 0.8, -3.2);
        scene.add(topBoard);

        var feltMat = new THREE.MeshStandardMaterial({ color: 0x6d28d9, emissive: 0x2a1040, roughness: 0.9 });
        var felt = new THREE.Mesh(new THREE.BoxGeometry(17, 0.05, 0.3), feltMat);
        felt.position.set(0, 0.3, -2.8);
        scene.add(felt);

        // === Piano keyboard data (2 octaves: C3-B4, 14 white + 10 black = 24 keys) ===
        var keyData = [
            // Lower octave (C3-B3)
            { note: 'C3',  key: 'Z', isBlack: false, midi: 48, x: -7.7 },
            { note: 'C#3', key: 'S', isBlack: true,  midi: 49, x: -7.1 },
            { note: 'D3',  key: 'X', isBlack: false, midi: 50, x: -6.5 },
            { note: 'D#3', key: 'D', isBlack: true,  midi: 51, x: -5.9 },
            { note: 'E3',  key: 'C', isBlack: false, midi: 52, x: -5.3 },
            { note: 'F3',  key: 'V', isBlack: false, midi: 53, x: -4.1 },
            { note: 'F#3', key: 'G', isBlack: true,  midi: 54, x: -3.5 },
            { note: 'G3',  key: 'B', isBlack: false, midi: 55, x: -2.9 },
            { note: 'G#3', key: 'H', isBlack: true,  midi: 56, x: -2.3 },
            { note: 'A3',  key: 'N', isBlack: false, midi: 57, x: -1.7 },
            { note: 'A#3', key: 'J', isBlack: true,  midi: 58, x: -1.1 },
            { note: 'B3',  key: 'M', isBlack: false, midi: 59, x: -0.5 },
            // Upper octave (C4-B4)
            { note: 'C4',  key: 'Q', isBlack: false, midi: 60, x:  0.7 },
            { note: 'C#4', key: '2', isBlack: true,  midi: 61, x:  1.3 },
            { note: 'D4',  key: 'W', isBlack: false, midi: 62, x:  1.9 },
            { note: 'D#4', key: '3', isBlack: true,  midi: 63, x:  2.5 },
            { note: 'E4',  key: 'E', isBlack: false, midi: 64, x:  3.1 },
            { note: 'F4',  key: 'R', isBlack: false, midi: 65, x:  4.3 },
            { note: 'F#4', key: '5', isBlack: true,  midi: 66, x:  4.9 },
            { note: 'G4',  key: 'T', isBlack: false, midi: 67, x:  5.5 },
            { note: 'G#4', key: '6', isBlack: true,  midi: 68, x:  6.1 },
            { note: 'A4',  key: 'Y', isBlack: false, midi: 69, x:  6.7 },
            { note: 'A#4', key: '7', isBlack: true,  midi: 70, x:  7.3 },
            { note: 'B4',  key: 'U', isBlack: false, midi: 71, x:  7.9 }
        ];

        var allKeys = [];
        var keyMap = {};

        keyData.forEach(function(data) {
            var group = new THREE.Group();

            // Main key body
            var keyGeo = data.isBlack
                ? new THREE.BoxGeometry(0.7, 0.7, 3.5)
                : new THREE.BoxGeometry(1.1, 0.5, 5.5);
            var keyMat = data.isBlack
                ? new THREE.MeshStandardMaterial({ color: 0x15121f, metalness: 0.5, roughness: 0.25, emissive: 0x000000 })
                : new THREE.MeshStandardMaterial({ color: 0xf5f5f8, metalness: 0.2, roughness: 0.35, emissive: 0x000000 });
            var keyMesh = new THREE.Mesh(keyGeo, keyMat);
            group.add(keyMesh);

            // Front-edge rounded cap for white keys (slightly darker thin box at front-top)
            if (!data.isBlack) {
                var edgeGeo = new THREE.BoxGeometry(1.15, 0.08, 0.3);
                var edgeMat = new THREE.MeshStandardMaterial({ color: 0xd8d8e0, metalness: 0.3, roughness: 0.4 });
                var edgeMesh = new THREE.Mesh(edgeGeo, edgeMat);
                edgeMesh.position.set(0, 0.21, 2.6);
                group.add(edgeMesh);
            }

            var yPos = data.isBlack ? 0.35 : 0;
            var zPos = data.isBlack ? -0.8 : 0;
            group.position.set(data.x, yPos, zPos);

            group.userData = {
                note: data.note,
                key: data.key,
                isBlack: data.isBlack,
                originalY: yPos,
                pressed: false,
                freq: 440 * Math.pow(2, (data.midi - 69) / 12),
                material: keyMat
            };

            data.freq = group.userData.freq;
            data.mesh = group;
            keyMap[data.key] = data;

            scene.add(group);
            allKeys.push(group);
        });

        // === Star field (2000 stars, spherical distribution, vertex colors) ===
        var starCount = 2000;
        var starGeo = new THREE.BufferGeometry();
        var starPos = new Float32Array(starCount * 3);
        var starCol = new Float32Array(starCount * 3);
        var palette = [
            new THREE.Color(0xffffff),
            new THREE.Color(0x8b5cf6),
            new THREE.Color(0xdb2777),
            new THREE.Color(0x22d3ee)
        ];
        for (var i = 0; i < starCount; i++) {
            var radius = 40 + Math.random() * 40;
            var theta = Math.random() * Math.PI * 2;
            var phi = Math.acos(2 * Math.random() - 1);
            starPos[i * 3]     = radius * Math.sin(phi) * Math.cos(theta);
            starPos[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
            starPos[i * 3 + 2] = radius * Math.cos(phi);
            var c = palette[Math.floor(Math.random() * palette.length)];
            starCol[i * 3]     = c.r;
            starCol[i * 3 + 1] = c.g;
            starCol[i * 3 + 2] = c.b;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        starGeo.setAttribute('color', new THREE.BufferAttribute(starCol, 3));
        var starMat = new THREE.PointsMaterial({
            size: 0.12,
            sizeAttenuation: true,
            transparent: true,
            opacity: 0.8,
            vertexColors: true
        });
        var starField = new THREE.Points(starGeo, starMat);
        scene.add(starField);

        // === Particle burst system ===
        var bursts = [];
        var burstGeo = new THREE.SphereGeometry(0.08, 6, 6);

        function createBurst(x, colorHex) {
            var count = 30 + Math.floor(Math.random() * 20);
            var particles = [];
            for (var i = 0; i < count; i++) {
                var mat = new THREE.MeshBasicMaterial({
                    color: colorHex,
                    transparent: true,
                    opacity: 1
                });
                var mesh = new THREE.Mesh(burstGeo, mat);
                mesh.position.set(x, 0.5, 0);
                var life = 80 + Math.random() * 40;
                mesh.userData = {
                    vx: (Math.random() - 0.5) * 0.1,
                    vy: 0.1 + Math.random() * 0.1,
                    vz: (Math.random() - 0.5) * 0.1,
                    life: life,
                    maxLife: life
                };
                scene.add(mesh);
                particles.push(mesh);
            }
            bursts.push(particles);
        }

        function updateBursts() {
            for (var i = bursts.length - 1; i >= 0; i--) {
                var particles = bursts[i];
                for (var j = particles.length - 1; j >= 0; j--) {
                    var p = particles[j];
                    var d = p.userData;
                    d.vy -= 0.008;
                    p.position.x += d.vx;
                    p.position.y += d.vy;
                    p.position.z += d.vz;
                    d.life--;
                    var ratio = d.life / d.maxLife;
                    p.material.opacity = ratio;
                    p.scale.setScalar(ratio);
                    if (d.life <= 0) {
                        scene.remove(p);
                        p.material.dispose();
                        particles.splice(j, 1);
                    }
                }
                if (particles.length === 0) {
                    bursts.splice(i, 1);
                }
            }
        }

        // === Web Audio (triangle-wave oscillator per key press) ===
        var audioCtx = null;
        function playNote(freq) {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            var ctx = audioCtx;
            var osc = ctx.createOscillator();
            var gain = ctx.createGain();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.3, ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);
            osc.connect(gain);
            gain.connect(ctx.destination);
            osc.start();
            osc.stop(ctx.currentTime + 0.8);
        }

        // === Keyboard event handlers ===
        var pressedKeys = {};

        document.addEventListener('keydown', function(e) {
            var key = e.key.length === 1 ? e.key.toUpperCase() : e.key;
            if (pressedKeys[key]) return;
            var data = keyMap[key];
            if (!data) return;
            pressedKeys[key] = true;
            e.preventDefault();

            var mesh = data.mesh;
            mesh.userData.pressed = true;
            mesh.position.y = mesh.userData.originalY - 0.35;

            if (data.isBlack) {
                mesh.userData.material.emissive.setHex(0xdb2777);
                mesh.userData.material.emissiveIntensity = 0.5;
                createBurst(mesh.position.x, 0xdb2777);
            } else {
                mesh.userData.material.emissive.setHex(0x22d3ee);
                mesh.userData.material.emissiveIntensity = 0.4;
                createBurst(mesh.position.x, 0x22d3ee);
            }

            playNote(mesh.userData.freq);
        });

        document.addEventListener('keyup', function(e) {
            var key = e.key.length === 1 ? e.key.toUpperCase() : e.key;
            if (!pressedKeys[key]) return;
            delete pressedKeys[key];
            var data = keyMap[key];
            if (!data) return;
            data.mesh.userData.pressed = false;
        });

        // === Camera controls (mouse drag + touch + idle auto-rotate) ===
        var cameraAngle = 0;
        var cameraPitch = 0.3;
        var isDragging = false;
        var lastPX = 0, lastPY = 0;
        var lastInteraction = Date.now();

        function onPointerDown(e) {
            isDragging = true;
            var pt = e.touches ? e.touches[0] : e;
            lastPX = pt.clientX;
            lastPY = pt.clientY;
            lastInteraction = Date.now();
            container.style.cursor = 'grabbing';
        }

        function onPointerMove(e) {
            if (!isDragging) return;
            var pt = e.touches ? e.touches[0] : e;
            var dx = pt.clientX - lastPX;
            var dy = pt.clientY - lastPY;
            cameraAngle -= dx * 0.005;
            cameraPitch = Math.max(-Math.PI / 6, Math.min(Math.PI / 3, cameraPitch + dy * 0.005));
            lastPX = pt.clientX;
            lastPY = pt.clientY;
            lastInteraction = Date.now();
            if (e.touches) e.preventDefault();
        }

        function onPointerUp() {
            isDragging = false;
            lastInteraction = Date.now();
            container.style.cursor = 'grab';
        }

        container.addEventListener('mousedown', onPointerDown);
        document.addEventListener('mousemove', onPointerMove);
        document.addEventListener('mouseup', onPointerUp);
        container.addEventListener('touchstart', onPointerDown, { passive: false });
        document.addEventListener('touchmove', onPointerMove, { passive: false });
        document.addEventListener('touchend', onPointerUp);

        // === Animation loop ===
        function animate() {
            requestAnimationFrame(animate);

            // Idle auto-rotate after 5 seconds
            if (Date.now() - lastInteraction > 5000) {
                cameraAngle += 0.003;
            }

            // Camera position (spherical coordinates with y oscillation)
            var r = 18;
            var cx = Math.sin(cameraAngle) * r * Math.cos(cameraPitch);
            var cy = 8 + r * Math.sin(cameraPitch) + Math.sin(cameraAngle * 0.5) * 2;
            var cz = Math.cos(cameraAngle) * r * Math.cos(cameraPitch);
            camera.position.set(cx, cy, cz);
            camera.lookAt(0, 0, 0);

            // Key release animation (lerp back to original Y + fade emissive)
            for (var i = 0; i < allKeys.length; i++) {
                var key = allKeys[i];
                if (!key.userData.pressed) {
                    key.position.y = THREE.MathUtils.lerp(key.position.y, key.userData.originalY, 0.2);
                    if (key.userData.material.emissiveIntensity > 0.001) {
                        key.userData.material.emissiveIntensity = THREE.MathUtils.lerp(key.userData.material.emissiveIntensity, 0, 0.1);
                    }
                }
            }

            // Star field slow rotation
            starField.rotation.y += 0.0003;

            // Particle bursts
            updateBursts();

            renderer.render(scene, camera);
        }
        animate();

        // === Window resize ===
        window.addEventListener('resize', function() {
            w = container.clientWidth || window.innerWidth;
            h = container.clientHeight || (window.innerHeight - 56);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });
    })();
    </script>
</body>
</html>
