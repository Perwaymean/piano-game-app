<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自由弹奏 · 键琴</title>
    <style id="theme-vars">
/* ============================================================
   键盘弹钢琴 — 品牌设计 Token
   prefix: piano | theme: dark (default) / light (high-contrast)
   ============================================================ */

/* --- @font-face (absolute URL, no @import) --- */
@font-face {
  font-family: 'Outfit';
  font-weight: 400;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/fontsource/fonts/outfit@latest/latin-400-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'Outfit';
  font-weight: 600;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/fontsource/fonts/outfit@latest/latin-600-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'Outfit';
  font-weight: 700;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/fontsource/fonts/outfit@latest/latin-700-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'JetBrains Mono';
  font-weight: 500;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/fontsource/fonts/jetbrains-mono@latest/latin-500-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'JetBrains Mono';
  font-weight: 700;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/fontsource/fonts/jetbrains-mono@latest/latin-700-normal.woff2') format('woff2');
}

/* --- @theme inline (fill-html-head.mjs semantic marker) --- */
@theme inline {
  --color-piano-purple: #6d28d9;
  --color-piano-pink: #db2777;
  --color-piano-cyan: #0891b2;
}

/* --- Brand Color Scale --- */
:root {
  --piano-purple: #6d28d9;
  --piano-purple-300: #c4b5fd;
  --piano-purple-400: #a78bfa;
  --piano-purple-500: #8b5cf6;
  --piano-purple-600: #7c3aed;
  --piano-purple-700: #5b21b6;

  --piano-pink: #db2777;
  --piano-pink-300: #f9a8d4;
  --piano-pink-400: #f472b6;
  --piano-pink-soft: rgba(219, 39, 119, 0.14);

  --piano-cyan: #0891b2;
  --piano-cyan-300: #67e8f9;
  --piano-cyan-400: #22d3ee;
  --piano-cyan-soft: rgba(8, 145, 178, 0.14);

  /* Semantic state colors (judgment tiers) */
  --state-success: #22d3ee;  /* Perfect ±50ms → cyan */
  --state-info: #8b5cf6;     /* Great ±100ms → purple */
  --state-warning: #db2777;  /* Good ±150ms → pink */
  --state-error: #f43f5e;    /* Miss → red */

  /* Radius scale (restrained) */
  --piano-radius-sm: 4px;
  --piano-radius-md: 8px;
  --piano-radius-lg: 16px;
  --piano-radius-full: 9999px;

  /* Typography */
  --piano-font-display: 'Outfit', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --piano-font-body: 'Outfit', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --piano-font-mono: 'JetBrains Mono', 'Noto Sans SC', monospace;
}

/* --- Light theme (high-contrast accessibility mode) --- */
:root {
  --piano-background: #ffffff;
  --piano-foreground: #0b0a14;
  --piano-card: #f6f7fb;
  --piano-card-foreground: #16182d;
  --piano-popover: #ffffff;
  --piano-popover-foreground: #0b0a14;
  --piano-muted: #eef0f7;
  --piano-muted-foreground: #6a6c80;
  --piano-border: #e7e8f0;
  --piano-input: #e7e8f0;
  --piano-ring: #6d28d9;
  --piano-primary: #6d28d9;
  --piano-primary-foreground: #ffffff;

  /* Semantic aliases for fill-html-head.mjs */
  --piano-radius-small: 4px;
  --piano-radius-medium: 8px;
  --piano-radius-large: 16px;
}

/* --- Dark theme (default immersive mode) --- */
.dark {
  --piano-background: #0d0b1a;
  --piano-foreground: #f4f1ff;
  --piano-card: #16132a;
  --piano-card-foreground: #ece8ff;
  --piano-popover: #1d1936;
  --piano-popover-foreground: #f4f1ff;
  --piano-muted: #1d1936;
  --piano-muted-foreground: #a89fcf;
  --piano-border: #2a2545;
  --piano-input: #2a2545;
  --piano-ring: #8b5cf6;
  --piano-primary: #8b5cf6;
  --piano-primary-foreground: #ffffff;

  --piano-radius-small: 4px;
  --piano-radius-medium: 8px;
  --piano-radius-large: 16px;
}

/* --- Semantic token fallback (fill-html-head.mjs marker) --- */
#semantic-token-fallback {
  --background: var(--piano-background);
  --foreground: var(--piano-foreground);
  --card: var(--piano-card);
  --card-foreground: var(--piano-card-foreground);
  --popover: var(--piano-popover);
  --popover-foreground: var(--piano-popover-foreground);
  --muted: var(--piano-muted);
  --muted-foreground: var(--piano-muted-foreground);
  --border: var(--piano-border);
  --input: var(--piano-input);
  --ring: var(--piano-ring);
  --primary: var(--piano-primary);
  --primary-foreground: var(--piano-primary-foreground);
  --radius-sm: var(--piano-radius-sm);
  --radius-md: var(--piano-radius-md);
  --radius-lg: var(--piano-radius-lg);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--piano-background);
    --color-foreground: var(--piano-foreground);
    --color-card: var(--piano-card);
    --color-card-foreground: var(--piano-card-foreground);
    --color-popover: var(--piano-popover);
    --color-popover-foreground: var(--piano-popover-foreground);
    --color-primary: var(--piano-primary);
    --color-primary-foreground: var(--piano-primary-foreground);
    --color-muted: var(--piano-muted);
    --color-muted-foreground: var(--piano-muted-foreground);
    --color-border: var(--piano-border);
    --color-input: var(--piano-input);
    --color-ring: var(--piano-ring);
    --radius-sm: var(--piano-radius-sm);
    --radius-md: var(--piano-radius-md);
    --radius-lg: var(--piano-radius-lg);
  }
  @layer base {
    body { background: var(--piano-background); color: var(--piano-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style id="semantic-token-fallback">

      .border-foreground { border-color: var(--piano-foreground); }

      .text-card-foreground { color: var(--piano-card-foreground); }
      .border-card-foreground { border-color: var(--piano-card-foreground); }

    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }

<body class="min-h-screen font-sans antialiased">
    <main>
      <!-- Fixed shared background -->
      <div aria-hidden="true" class="fixed inset-0 -z-10 pointer-events-none" style="background: radial-gradient(ellipse at 50% 0%, var(--piano-purple-700), var(--piano-background) 70%);"></div>

      <!-- Shared top bar -->
      <header class="fixed top-0 inset-x-0 z-50 h-14 flex items-center justify-between gap-2 px-4 sm:px-6" style="background: var(--piano-card); border-bottom: 1px solid var(--piano-border);">
        <a href="#" data-dom-id="back-home" class="shrink-0 whitespace-nowrap" style="font-family: var(--piano-font-display); font-size: 20px; font-weight: 700; color: var(--piano-foreground);">键琴</a>
        <nav class="flex items-center gap-4 sm:gap-6">
          <a href="#" data-nav-key="home" data-dom-id="nav-home" class="whitespace-nowrap text-sm sm:text-base transition-opacity hover:opacity-80" style="color: var(--piano-muted-foreground);">首页</a>
          <a href="#" data-nav-key="library" data-dom-id="nav-library" class="whitespace-nowrap text-sm sm:text-base transition-opacity hover:opacity-80" style="color: var(--piano-muted-foreground);">曲库</a>
          <a href="#" data-nav-key="settings" data-dom-id="nav-settings" class="whitespace-nowrap text-sm sm:text-base transition-opacity hover:opacity-80" style="color: var(--piano-muted-foreground);">设置</a>
        </nav>
        <div class="flex items-center gap-1 shrink-0">
          <button type="button" aria-label="切换主题" class="inline-flex items-center justify-center h-9 w-9 rounded-md transition-opacity hover:opacity-80" style="color: var(--piano-muted-foreground);">
            <i data-lucide="palette" class="h-5 w-5"></i>
          </button>
          <button type="button" aria-label="帮助" class="inline-flex items-center justify-center h-9 w-9 rounded-md transition-opacity hover:opacity-80" style="color: var(--piano-muted-foreground);">
            <i data-lucide="help-circle" class="h-5 w-5"></i>
          </button>
        </div>
      </header>

      <!-- App shell root -->
      <div data-viewport-mode="app-shell" class="h-screen overflow-hidden min-h-0 flex flex-col pt-14">
        <!-- MAIN AREA: left panel + center stage + right panel -->
        <div class="flex-1 flex min-h-0 overflow-hidden">

          <!-- LEFT CONTROL PANEL -->
          <aside data-scroll-region="primary" class="hidden lg:flex w-[220px] shrink-0 flex-col gap-4 overflow-y-auto no-scrollbar p-4" style="background: var(--piano-card); border-right: 1px solid var(--piano-border);">
            <!-- Octave -->
            <div class="flex flex-col gap-2">
              <span class="text-xs uppercase whitespace-nowrap" style="color: var(--piano-muted-foreground);">八度</span>
              <span class="whitespace-nowrap" style="font-family: var(--piano-font-mono); font-size: 24px; font-weight: 700; color: var(--piano-foreground);">C4</span>
              <div class="flex gap-2">
                <button type="button" class="flex-1 text-center py-2 rounded-md transition-opacity hover:opacity-80 whitespace-nowrap" style="font-family: var(--piano-font-mono); border: 1px solid var(--piano-border); color: var(--piano-foreground);">Z ←</button>
                <button type="button" class="flex-1 text-center py-2 rounded-md transition-opacity hover:opacity-80 whitespace-nowrap" style="font-family: var(--piano-font-mono); border: 1px solid var(--piano-border); color: var(--piano-foreground);">X →</button>
              </div>
            </div>
            <!-- Timbre -->
            <div class="flex flex-col gap-2">
              <span class="text-xs uppercase whitespace-nowrap" style="color: var(--piano-muted-foreground);">音色</span>
              <div class="flex flex-col gap-1">
                <button type="button" class="text-left px-3 py-2 rounded-md cursor-pointer whitespace-nowrap" style="background: var(--piano-primary); color: var(--piano-primary-foreground); border: 1px solid var(--piano-primary); font-size: 13px;">三角钢琴</button>
                <button type="button" class="text-left px-3 py-2 rounded-md cursor-pointer transition-opacity hover:opacity-80 whitespace-nowrap" style="border: 1px solid var(--piano-border); color: var(--piano-foreground); font-size: 13px;">音乐盒</button>
                <button type="button" class="text-left px-3 py-2 rounded-md cursor-pointer transition-opacity hover:opacity-80 whitespace-nowrap" style="border: 1px solid var(--piano-border); color: var(--piano-foreground); font-size: 13px;">合成Pad</button>
                <button type="button" class="text-left px-3 py-2 rounded-md cursor-pointer transition-opacity hover:opacity-80 whitespace-nowrap" style="border: 1px solid var(--piano-border); color: var(--piano-foreground); font-size: 13px;">8-bit</button>
              </div>
            </div>
            <!-- Sustain -->
            <div class="flex flex-col gap-2">
              <span class="text-xs uppercase whitespace-nowrap" style="color: var(--piano-muted-foreground);">延音踏板</span>
              <div class="flex items-center justify-between">
                <span class="text-sm whitespace-nowrap" style="color: var(--piano-foreground);">空格键</span>
                <button type="button" aria-label="延音开关" class="relative h-5 w-9 rounded-full shrink-0" style="background: var(--piano-border);">
                  <span class="absolute top-0.5 left-0.5 h-4 w-4 rounded-full" style="background: var(--piano-foreground);"></span>
                </button>
              </div>
            </div>
            <!-- Metronome -->
            <div class="flex flex-col gap-2">
              <span class="text-xs uppercase whitespace-nowrap" style="color: var(--piano-muted-foreground);">节拍器</span>
              <div class="flex items-center justify-between">
                <span class="text-sm whitespace-nowrap" style="color: var(--piano-foreground);">开启</span>
                <button type="button" aria-label="节拍器开关" class="relative h-5 w-9 rounded-full shrink-0" style="background: var(--piano-border);">
                  <span class="absolute top-0.5 left-0.5 h-4 w-4 rounded-full" style="background: var(--piano-foreground);"></span>
                </button>
              </div>
              <span class="whitespace-nowrap" style="font-family: var(--piano-font-mono); font-size: 14px; color: var(--piano-muted-foreground);">120 BPM</span>
            </div>
            <!-- Recording -->
            <div class="flex flex-col gap-2 items-center">
              <span class="self-start text-xs uppercase whitespace-nowrap" style="color: var(--piano-muted-foreground);">录音</span>
              <button type="button" aria-label="录音" class="h-12 w-12 rounded-full flex items-center justify-center transition-opacity hover:opacity-90" style="background: var(--piano-pink);">
                <i data-lucide="circle" class="h-5 w-5" style="color: var(--piano-primary-foreground);"></i>
              </button>
              <span class="whitespace-nowrap" style="font-family: var(--piano-font-mono); font-size: 14px; color: var(--piano-muted-foreground);">00:00</span>
              <span class="text-xs text-center whitespace-nowrap" style="color: var(--piano-muted-foreground);">录音 / 回放 / 导出</span>
            </div>
          </aside>

          <!-- CENTER STAGE -->
          <div class="flex-1 relative flex flex-col min-w-0">
            <!-- 3D Visual area -->
            <div class="flex-1 relative overflow-hidden">
              <canvas id="piano3d" class="absolute inset-0 w-full h-full"></canvas>
              <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <span class="whitespace-nowrap" style="font-family: var(--piano-font-mono); font-size: 48px; font-weight: 700; color: var(--piano-purple-400); opacity: 0.8;">C4</span>
              </div>
              <span class="absolute bottom-3 left-3 whitespace-nowrap" style="font-size: 12px; color: var(--piano-muted-foreground);">按下键盘 A-J 弹奏 · Z/X 切换八度</span>
            </div>
            <!-- CTA bar -->
            <a href="#" data-dom-id="cta-to-follow-play" class="absolute top-4 right-4 z-10 inline-flex items-center justify-center whitespace-nowrap rounded-md px-5 py-2 transition-opacity hover:opacity-90" style="background: var(--piano-primary); color: var(--piano-primary-foreground); font-family: var(--piano-font-display); font-size: 13px; font-weight: 600;">选曲跟弹 →</a>
          </div>

          <!-- RIGHT INFO PANEL -->
          <aside class="hidden lg:flex w-[240px] shrink-0 flex-col gap-4 overflow-y-auto no-scrollbar p-4" style="background: var(--piano-card); border-left: 1px solid var(--piano-border);">
            <!-- Key mapping -->
            <div class="flex flex-col gap-2">
              <span class="text-xs uppercase whitespace-nowrap" style="color: var(--piano-muted-foreground);">按键映射</span>
              <div class="flex flex-col gap-1">
                <div class="flex items-center gap-2">
                  <span class="inline-flex items-center justify-center rounded-sm px-1.5 py-0.5 whitespace-nowrap" style="background: var(--piano-muted); font-family: var(--piano-font-mono); font-size: 12px; color: var(--piano-foreground);">A</span>
                  <span style="color: var(--piano-muted-foreground); font-size: 12px;">→</span>
                  <span class="ml-auto whitespace-nowrap" style="font-family: var(--piano-font-mono); font-size: 12px; color: var(--piano-foreground);">C4</span>
                </div>
                <div class="flex items-center gap-2">
                  <span class="inline-flex items-center justify-center rounded-sm px-1.5 py-0.5 whitespace-nowrap" style="background: var(--piano-muted); font-family: var(--piano-font-mono); font-size: 12px; color: var(--piano-foreground);">W</span>
                  <span style="color: var(--piano-muted-foreground); font-size: 12px;">→</span>
                  <span class="ml-auto whitespace-nowrap" style="font-family: var(--piano-font-mono); font-size: 12px; color: var(--piano-foreground);">C#4</span>
                </div>
                <div class="flex items-center gap-2">
                  <span class="inline-flex items-center justify-center rounded-sm px-1.5 py-0.5 whitespace-nowrap" style="background: var(--piano-muted); font-family: var(--piano-font-mono); font-size: 12px; color: var(--piano-foreground);">S</span>
                  <span style="color: var(--piano-muted-foreground); font-size: 12px;">→</span>
                  <span class="ml-auto whitespace-nowrap" style="font-family: var(--piano-font-mono); font-size: 12px; color: var(--piano-foreground);">D4</span>
                </div>
                <div class="flex items-center gap-2">
                  <span class="inline-flex items-center justify-center rounded-sm px-1.5 py-0.5 whitespace-nowrap" style="background: var(--piano-muted); font-family: var(--piano-font-mono); font-size: 12px; color: var(--piano-foreground);">E</span>
                  <span style="color: var(--piano-muted-foreground); font-size: 12px;">→</span>
                  <span class="ml-auto whitespace-nowrap" style="font-family: var(--piano-font-mono); font-size: 12px; color: var(--piano-foreground);">D#4</span>
                </div>
                <div class="flex items-center gap-2">
                  <span class="inline-flex items-center justify-center rounded-sm px-1.5 py-0.5 whitespace-nowrap" style="background: var(--piano-muted); font-family: var(--piano-font-mono); font-size: 12px; color: var(--piano-foreground);">D</span>
                  <span style="color: var(--piano-muted-foreground); font-size: 12px;">→</span>
                  <span class="ml-auto whitespace-nowrap" style="font-family: var(--piano-font-mono); font-size: 12px; color: var(--piano-foreground);">E4</span>
                </div>
                <div class="flex items-center gap-2">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
      (function () {
        var canvas = document.getElementById('piano3d');
        if (!canvas || typeof THREE === 'undefined') return;

        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(60, 1, 0.1, 100);
        camera.position.set(0, 0, 8);

        var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

        var palette = [0x8b5cf6, 0xa78bfa, 0x6d28d9, 0xc4b5fd, 0x7c3aed];
        var shapes = [];
        for (var i = 0; i < 7; i++) {
          var size = 0.6 + Math.random() * 0.8;
          var geo = new THREE.BoxGeometry(size, size, size);
          var edges = new THREE.EdgesGeometry(geo);
          var mat = new THREE.LineBasicMaterial({
            color: palette[i % palette.length],
            transparent: true,
            opacity: 0.5
          });
          var line = new THREE.LineSegments(edges, mat);
          line.position.set(
            (Math.random() - 0.5) * 12,
            (Math.random() - 0.5) * 7,
            (Math.random() - 0.5) * 4 - 2
          );
          line.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
          line.userData.rotSpeed = 0.002 + Math.random() * 0.004;
          scene.add(line);
          shapes.push(line);
        }

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        function resize() {
          var parent = canvas.parentElement;
          if (!parent) return;
          var w = parent.clientWidth;
          var h = parent.clientHeight;
          if (w > 0 && h > 0) {
            renderer.setSize(w, h, false);
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
          }
        }

        function animate() {
          requestAnimationFrame(animate);
          for (var i = 0; i < shapes.length; i++) {
            shapes[i].rotation.x += shapes[i].userData.rotSpeed;
            shapes[i].rotation.y += shapes[i].userData.rotSpeed * 0.7;
          }
          renderer.render(scene, camera);
        }

        resize();
        animate();
        window.addEventListener('resize', resize);
        if (window.ResizeObserver && canvas.parentElement) {
          new ResizeObserver(resize).observe(canvas.parentElement);
        }
      })();
    </script>
