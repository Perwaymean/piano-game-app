<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 转谱 · 键琴</title>
    <style id="theme-vars">
/* ============================================================
   键盘弹钢琴 — 品牌设计 Token
   prefix: piano | theme: dark (default) / light (high-contrast)
   ============================================================ */

/* --- @font-face (absolute URL, no @import) --- */
@font-face {
  font-family: 'Outfit';
  font-weight: 400;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/fontsource/fonts/outfit@latest/latin-400-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'Outfit';
  font-weight: 600;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/fontsource/fonts/outfit@latest/latin-600-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'Outfit';
  font-weight: 700;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/fontsource/fonts/outfit@latest/latin-700-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'JetBrains Mono';
  font-weight: 500;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/fontsource/fonts/jetbrains-mono@latest/latin-500-normal.woff2') format('woff2');
}
@font-face {
  font-family: 'JetBrains Mono';
  font-weight: 700;
  font-display: swap;
  src: url('https://cdn.jsdelivr.net/fontsource/fonts/jetbrains-mono@latest/latin-700-normal.woff2') format('woff2');
}

/* --- @theme inline (fill-html-head.mjs semantic marker) --- */
@theme inline {
  --color-piano-purple: #6d28d9;
  --color-piano-pink: #db2777;
  --color-piano-cyan: #0891b2;
}

/* --- Brand Color Scale --- */
:root {
  --piano-purple: #6d28d9;
  --piano-purple-300: #c4b5fd;
  --piano-purple-400: #a78bfa;
  --piano-purple-500: #8b5cf6;
  --piano-purple-600: #7c3aed;
  --piano-purple-700: #5b21b6;

  --piano-pink: #db2777;
  --piano-pink-300: #f9a8d4;
  --piano-pink-400: #f472b6;
  --piano-pink-soft: rgba(219, 39, 119, 0.14);

  --piano-cyan: #0891b2;
  --piano-cyan-300: #67e8f9;
  --piano-cyan-400: #22d3ee;
  --piano-cyan-soft: rgba(8, 145, 178, 0.14);

  /* Semantic state colors (judgment tiers) */
  --state-success: #22d3ee;  /* Perfect ±50ms → cyan */
  --state-info: #8b5cf6;     /* Great ±100ms → purple */
  --state-warning: #db2777;  /* Good ±150ms → pink */
  --state-error: #f43f5e;    /* Miss → red */

  /* Radius scale (restrained) */
  --piano-radius-sm: 4px;
  --piano-radius-md: 8px;
  --piano-radius-lg: 16px;
  --piano-radius-full: 9999px;

  /* Typography */
  --piano-font-display: 'Outfit', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --piano-font-body: 'Outfit', 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --piano-font-mono: 'JetBrains Mono', 'Noto Sans SC', monospace;
}

/* --- Light theme (high-contrast accessibility mode) --- */
:root {
  --piano-background: #ffffff;
  --piano-foreground: #0b0a14;
  --piano-card: #f6f7fb;
  --piano-card-foreground: #16182d;
  --piano-popover: #ffffff;
  --piano-popover-foreground: #0b0a14;
  --piano-muted: #eef0f7;
  --piano-muted-foreground: #6a6c80;
  --piano-border: #e7e8f0;
  --piano-input: #e7e8f0;
  --piano-ring: #6d28d9;
  --piano-primary: #6d28d9;
  --piano-primary-foreground: #ffffff;

  /* Semantic aliases for fill-html-head.mjs */
  --piano-radius-small: 4px;
  --piano-radius-medium: 8px;
  --piano-radius-large: 16px;
}

/* --- Dark theme (default immersive mode) --- */
.dark {
  --piano-background: #0d0b1a;
  --piano-foreground: #f4f1ff;
  --piano-card: #16132a;
  --piano-card-foreground: #ece8ff;
  --piano-popover: #1d1936;
  --piano-popover-foreground: #f4f1ff;
  --piano-muted: #1d1936;
  --piano-muted-foreground: #a89fcf;
  --piano-border: #2a2545;
  --piano-input: #2a2545;
  --piano-ring: #8b5cf6;
  --piano-primary: #8b5cf6;
  --piano-primary-foreground: #ffffff;

  --piano-radius-small: 4px;
  --piano-radius-medium: 8px;
  --piano-radius-large: 16px;
}

/* --- Semantic token fallback (fill-html-head.mjs marker) --- */
#semantic-token-fallback {
  --background: var(--piano-background);
  --foreground: var(--piano-foreground);
  --card: var(--piano-card);
  --card-foreground: var(--piano-card-foreground);
  --popover: var(--piano-popover);
  --popover-foreground: var(--piano-popover-foreground);
  --muted: var(--piano-muted);
  --muted-foreground: var(--piano-muted-foreground);
  --border: var(--piano-border);
  --input: var(--piano-input);
  --ring: var(--piano-ring);
  --primary: var(--piano-primary);
  --primary-foreground: var(--piano-primary-foreground);
  --radius-sm: var(--piano-radius-sm);
  --radius-md: var(--piano-radius-md);
  --radius-lg: var(--piano-radius-lg);
}

    </style>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.3.1/dist/index.global.js"></script>
    <script src="https://unpkg.com/lucide@1.8.0/dist/umd/lucide.min.js"></script>
    <style type="text/tailwindcss">
  @theme inline {
    --color-background: var(--piano-background);
    --color-foreground: var(--piano-foreground);
    --color-card: var(--piano-card);
    --color-card-foreground: var(--piano-card-foreground);
    --color-popover: var(--piano-popover);
    --color-popover-foreground: var(--piano-popover-foreground);
    --color-primary: var(--piano-primary);
    --color-primary-foreground: var(--piano-primary-foreground);
    --color-muted: var(--piano-muted);
    --color-muted-foreground: var(--piano-muted-foreground);
    --color-border: var(--piano-border);
    --color-input: var(--piano-input);
    --color-ring: var(--piano-ring);
    --radius-sm: var(--piano-radius-sm);
    --radius-md: var(--piano-radius-md);
    --radius-lg: var(--piano-radius-lg);
  }
  @layer base {
    body { background: var(--piano-background); color: var(--piano-foreground); }
    td, th { @apply break-words; word-break: break-all; word-break: auto-phrase; }
    th { @apply whitespace-nowrap; }
  }
    </style>
    <style id="semantic-token-fallback">
      .bg-background { background-color: var(--piano-background); }
      .text-background { color: var(--piano-background); }
      .border-background { border-color: var(--piano-background); }
      .ring-background { --tw-ring-color: var(--piano-background); }
      .bg-foreground { background-color: var(--piano-foreground); }
      .text-foreground { color: var(--piano-foreground); }
      .border-foreground { border-color: var(--piano-foreground); }
      .ring-foreground { --tw-ring-color: var(--piano-foreground); }
      .bg-card { background-color: var(--piano-card); }
      .text-card { color: var(--piano-card); }
      .border-card { border-color: var(--piano-card); }
      .ring-card { --tw-ring-color: var(--piano-card); }
      .bg-card-foreground { background-color: var(--piano-card-foreground); }
      .text-card-foreground { color: var(--piano-card-foreground); }
      .border-card-foreground { border-color: var(--piano-card-foreground); }
      .ring-card-foreground { --tw-ring-color: var(--piano-card-foreground); }
      .bg-popover { background-color: var(--piano-popover); }
      .text-popover { color: var(--piano-popover); }
      .border-popover { border-color: var(--piano-popover); }
      .ring-popover { --tw-ring-color: var(--piano-popover); }
      .bg-popover-foreground { background-color: var(--piano-popover-foreground); }
      .text-popover-foreground { color: var(--piano-popover-foreground); }
      .border-popover-foreground { border-color: var(--piano-popover-foreground); }
      .ring-popover-foreground { --tw-ring-color: var(--piano-popover-foreground); }
      .bg-primary { background-color: var(--piano-primary); }
      .text-primary { color: var(--piano-primary); }
      .border-primary { border-color: var(--piano-primary); }
      .ring-primary { --tw-ring-color: var(--piano-primary); }
      .bg-primary-foreground { background-color: var(--piano-primary-foreground); }
      .text-primary-foreground { color: var(--piano-primary-foreground); }
      .border-primary-foreground { border-color: var(--piano-primary-foreground); }
      .ring-primary-foreground { --tw-ring-color: var(--piano-primary-foreground); }
      .bg-muted { background-color: var(--piano-muted); }
      .text-muted { color: var(--piano-muted); }
      .border-muted { border-color: var(--piano-muted); }
      .ring-muted { --tw-ring-color: var(--piano-muted); }
      .bg-muted-foreground { background-color: var(--piano-muted-foreground); }
      .text-muted-foreground { color: var(--piano-muted-foreground); }
      .border-muted-foreground { border-color: var(--piano-muted-foreground); }
      .ring-muted-foreground { --tw-ring-color: var(--piano-muted-foreground); }
      .bg-border { background-color: var(--piano-border); }
      .text-border { color: var(--piano-border); }
      .border-border { border-color: var(--piano-border); }
      .ring-border { --tw-ring-color: var(--piano-border); }
      .bg-input { background-color: var(--piano-input); }
      .text-input { color: var(--piano-input); }

    </style>
    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      [data-icon] {
        display: inline-flex;

        justify-content: center;

        mask-size: contain;

</head>
<body class="min-h-screen font-sans antialiased">
    <main>
      <!-- Shared background -->
      <div class="fixed inset-0 -z-10" style="background: radial-gradient(ellipse at 50% 0%, var(--piano-purple-700), var(--piano-background) 70%);"></div>

      <!-- Shared top bar -->
      <header class="fixed top-0 left-0 right-0 z-50 h-14 flex items-center justify-between px-4 sm:px-6" style="background-color: var(--piano-card); border-bottom: 1px solid var(--piano-border);">
        <a href="#" data-dom-id="back-home" class="shrink-0 truncate" style="font-family: var(--piano-font-display); font-size: 20px; font-weight: 700; color: var(--piano-foreground);">键琴</a>
        <nav class="flex items-center gap-4 sm:gap-6">
          <a href="#" data-nav-key="home" data-dom-id="nav-home" class="text-sm whitespace-nowrap" style="color: var(--piano-muted-foreground);">首页</a>
          <a href="#" data-nav-key="library" data-dom-id="nav-library" class="text-sm whitespace-nowrap" style="color: var(--piano-muted-foreground);">曲库</a>
          <a href="#" data-nav-key="settings" data-dom-id="nav-settings" class="text-sm whitespace-nowrap" style="color: var(--piano-muted-foreground);">设置</a>
        </nav>
        <div class="flex items-center gap-1 shrink-0">
          <button class="w-9 h-9 flex items-center justify-center" style="color: var(--piano-muted-foreground); border-radius: var(--piano-radius-md);">
            <i data-lucide="palette" class="w-5 h-5"></i>
          </button>
          <button class="w-9 h-9 flex items-center justify-center" style="color: var(--piano-muted-foreground); border-radius: var(--piano-radius-md);">
            <i data-lucide="help-circle" class="w-5 h-5"></i>
          </button>
        </div>
      </header>

      <!-- Page content -->
      <div class="mx-auto w-full max-w-[800px] px-4 sm:px-6" style="padding-top: 80px; padding-bottom: 48px;">

        <!-- 1. Page header -->
        <div class="mb-6">
          <h1 style="font-family: var(--piano-font-display); font-size: 32px; font-weight: 700; color: var(--piano-foreground); text-wrap: balance; word-break: keep-all; overflow-wrap: break-word;">AI 转谱</h1>
          <p class="mt-1" style="font-family: var(--piano-font-body); font-size: 14px; color: var(--piano-muted-foreground);">上传音频，AI 自动生成可弹奏的谱面</p>
        </div>

        <!-- 2. Upload zone -->
        <section class="mb-6">
          <div class="text-center" style="border: 2px dashed var(--piano-border); border-radius: var(--piano-radius-lg); padding: 48px;">
            <div class="flex justify-center mb-4" style="color: var(--piano-muted-foreground);">
              <i data-lucide="upload-cloud" style="width: 48px; height: 48px;"></i>
            </div>
            <p style="font-family: var(--piano-font-body); font-size: 16px; color: var(--piano-foreground);">拖拽音频文件到此处，或点击选择</p>
            <p class="mt-2 whitespace-nowrap" style="font-family: var(--piano-font-mono); font-size: 12px; color: var(--piano-muted-foreground);">MP4 / WAV / MP3 / OGG / FLAC</p>
            <p class="mt-1" style="font-family: var(--piano-font-body); font-size: 12px; color: var(--piano-muted-foreground);">建议 ≤ 2 分钟 ≤ 10MB，单乐器效果最佳</p>
            <div class="mt-3 flex items-center justify-center gap-1.5">
              <i data-lucide="shield-check" class="w-4 h-4 shrink-0" style="color: var(--piano-cyan-400);"></i>
              <span class="whitespace-nowrap" style="font-family: var(--piano-font-body); font-size: 12px; color: var(--piano-cyan-400);">音频仅本地处理，不上传服务器</span>
            </div>
            <div class="mt-3">
              <a href="#" class="whitespace-nowrap" style="font-family: var(--piano-font-body); font-size: 12px; color: var(--piano-purple-400);">直传 .mid 文件跳过 AI</a>
            </div>
          </div>
        </section>

        <!-- 3. Progress section -->
        <section class="mb-6" style="background-color: var(--piano-card); border: 1px solid var(--piano-border); border-radius: var(--piano-radius-lg); padding: 20px;">
          <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
              <span class="relative flex h-2 w-2 shrink-0">
                <span class="animate-ping absolute inline-flex h-full w-full opacity-75" style="border-radius: var(--piano-radius-full); background-color: var(--piano-primary);"></span>
                <span class="relative inline-flex h-2 w-2" style="border-radius: var(--piano-radius-full); background-color: var(--piano-primary);"></span>
              </span>
              <span class="whitespace-nowrap" style="font-family: var(--piano-font-body); font-size: 14px; font-weight: 600; color: var(--piano-foreground);">正在处理</span>
            </div>
            <span class="whitespace-nowrap" style="font-family: var(--piano-font-mono); font-size: 14px; color: var(--piano-foreground);">68%</span>
          </div>
          <div class="w-full mb-4" style="height: 8px; background-color: var(--piano-muted); border-radius: var(--piano-radius-full); overflow: hidden;">
            <div style="width: 68%; height: 100%; background: linear-gradient(90deg, var(--piano-purple-500), var(--piano-pink)); border-radius: var(--piano-radius-full);"></div>
          </div>
          <div class="flex items-center gap-2 mb-3 flex-wrap">
            <span class="whitespace-nowrap" style="font-family: var(--piano-font-body); font-size: 12px; font-weight: 600; color: var(--piano-primary);">提取音轨</span>
            <i data-lucide="chevron-right" class="w-4 h-4 shrink-0" style="color: var(--piano-muted-foreground);"></i>
            <span class="whitespace-nowrap" style="font-family: var(--piano-font-body); font-size: 12px; color: var(--piano-muted-foreground);">Basic Pitch 推理</span>
            <i data-lucide="chevron-right" class="w-4 h-4 shrink-0" style="color: var(--piano-muted-foreground);"></i>
            <span class="whitespace-nowrap" style="font-family: var(--piano-font-body); font-size: 12px; color: var(--piano-muted-foreground);">生成乐谱</span>
          </div>
          <div class="flex items-center justify-between gap-3">
            <span class="whitespace-nowrap" style="font-family: var(--piano-font-mono); font-size: 12px; color: var(--piano-muted-foreground);">已用 0:12</span>
            <button class="px-4 py-1.5 whitespace-nowrap" style="font-family: var(--piano-font-body); font-size: 13px; color: var(--piano-muted-foreground); border: 1px solid var(--piano-border); border-radius: var(--piano-radius-md); background-color: transparent;">取消</button>
          </div>
        </section>

        <!-- 4. Result preview section -->
        <section class="mb-6">
          <h2 class="mb-4" style="font-family: var(--piano-font-display); font-size: 20px; font-weight: 700; color: var(--piano-foreground);">识别结果</h2>

          <!-- Stats row: 3 bordered sections (not cards) -->
          <div class="grid grid-cols-3 gap-3 mb-4">
            <div class="text-center min-w-0" style="border: 1px solid var(--piano-border); border-radius: var(--piano-radius-md); padding: 16px;">
              <div class="whitespace-nowrap" style="font-family: var(--piano-font-mono); font-size: 32px; font-weight: 700; color: var(--piano-foreground); line-height: 1.2;">248</div>
              <div class="mt-1 whitespace-nowrap" style="font-family: var(--piano-font-body); font-size: 12px; color: var(--piano-muted-foreground);">音符数</div>
            </div>
            <div class="text-center min-w-0" style="border: 1px solid var(--piano-border); border-radius: var(--piano-radius-md); padding: 16px;">
              <div class="whitespace-nowrap" style="font-family: var(--piano-font-mono); font-size: 32px; font-weight: 700; color: var(--piano-foreground); line-height: 1.2;">0:32</div>
              <div class="mt-1 whitespace-nowrap" style="font-family: var(--piano-font-body); font-size: 12px; color: var(--piano-muted-foreground);">时长</div>
            </div>
            <div class="text-center min-w-0" style="border: 1px solid var(--piano-border); border-radius: var(--piano-radius-md); padding: 16px;">
              <div class="whitespace-nowrap" style="font-family: var(--piano-font-mono); font-size: 32px; font-weight: 700; color: var(--piano-foreground); line-height: 1.2;">96</div>
              <div class="mt-1 whitespace-nowrap" style="font-family: var(--piano-font-body); font-size: 12px; color: var(--piano-muted-foreground);">估算BPM</div>
            </div>
          </div>

          <!-- Staff notation preview -->
          <div class="mb-3 flex flex-col items-center justify-center gap-2" style="height: 120px; background-color: var(--piano-card); border: 1px solid var(--piano-border); border-radius: var(--piano-radius-md);">
            <i data-lucide="file-music" class="w-6 h-6" style="color: var(--piano-muted-foreground);"></i>
            <span class="whitespace-nowrap" style="font-family: var(--piano-font-body); font-size: 13px; color: var(--piano-muted-foreground);">五线谱预览</span>
          </div>

          <!-- Falling notes preview -->
          <div class="mb-4 flex flex-col items-center justify-center gap-2" style="height: 120px; background-color: var(--piano-card); border: 1px solid var(--piano-border); border-radius: var(--piano-radius-md);">
            <i data-lucide="music" class="w-6 h-6" style="color: var(--piano-muted-foreground);"></i>
            <span class="whitespace-nowrap" style="font-family: var(--piano-font-body); font-size: 13px; color: var(--piano-muted-foreground);">下落谱面预览</span>
          </div>

          <!-- Audio comparison -->
          <div class="grid grid-cols-2 gap-3 mb-4">
            <button class="flex items-center justify-center gap-2 py-2.5" style="font-family: var(--piano-font-body); font-size: 14px; color: var(--piano-foreground); border: 1px solid var(--piano-border); border-radius: var(--piano-radius-md); background-color: transparent;">
              <i data-lucide="play" class="w-4 h-4 shrink-0"></i>
              <span class="whitespace-nowrap">试听原音频</span>
            </button>
            <button class="flex items-center justify-center gap-2 py-2.5" style="font-family: var(--piano-font-body); font-size: 14px; color: var(--piano-foreground); border: 1px solid var(--piano-border); border-radius: var(--piano-radius-md); background-color: transparent;">
              <i data-lucide="play" class="w-4 h-4 shrink-0"></i>
              <span class="whitespace-nowrap">试听 MIDI</span>
            </button>
          </div>

          <!-- Disclaimer -->
          <div class="flex items-center gap-1.5">
            <i data-lucide="info" class="w-3.5 h-3.5 shrink-0" style="color: var(--piano-muted-foreground);"></i>
            <span style="font-family: var(--piano-font-body); font-size: 12px; color: var(--piano-muted-foreground);">AI 识别结果仅供参考，建议人工校对</span>
          </div>
        </section>

        <!-- 5. CTA section -->
        <section class="mb-8 flex justify-center">
          <button data-dom-id="cta-enter-follow" class="whitespace-nowrap" style="font-family: var(--piano-font-display); font-size: 16px; font-weight: 600; color: var(--piano-primary-foreground); background-color: var(--piano-primary); border: none; border-radius: var(--piano-radius-md); padding: 12px 32px; cursor: pointer;">进入跟弹</button>
